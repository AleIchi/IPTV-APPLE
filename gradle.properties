# Project-wide Gradle settings.
# JVM optimizado: G1GC para compilaciones largas, memoria aumentada, compilación incremental
org.gradle.jvmargs=-Xmx3072m -XX:+UseG1GC -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8 -Djava.net.preferIPv4Stack=true -Djava.net.preferIPv6Addresses=false
# Construcción en paralelo y caché de Gradle para compilaciones incrementales más rápidas
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true
android.useAndroidX=true
# android.enableJetifier=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# android.defaults.buildfeatures.resvalues=true
# android.sdk.defaultTargetSdkToCompileSdkIfUnset=false
# android.enableAppCompileTimeRClass=false
# android.usesSdkInManifest.disallowed=false
android.uniquePackageNames=false
android.dependency.useConstraints=true
android.r8.strictFullModeForKeepRules=false
# android.r8.optimizedResourceShrinking=false

# Requerido por el plugin Kotlin Android actual en AGP 9.0+ para evitar conflicto de registro de la extensión 'kotlin'
android.builtInKotlin=false
# Requerido para compatibilidad con la sintaxis del build.gradle.kts actual
android.newDsl=false

